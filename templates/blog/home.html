{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> {{ page_title }} </h1>

    {% for post in posts %}
        <div>
            <p>{{ post.title }}</p>

            {% if post.published %}
                <span>Опубликовано</span>
            {% else %}
                <span>Черновик</span>
            {% endif %}
        </div>
    {% endfor %}
</body>
</html>
